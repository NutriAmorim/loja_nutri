{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bem-vindo ao Nutri Amorim{% endblock %}</title>
    
    <link rel="icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">

    <style>
        body {
            display: flex;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Barra lateral esquerda */
        .sidebar {
            width: 250px;
            background-color: #2E8B57; /* Cor verde-mata */
            padding: 20px;
            color: white;
            position: fixed;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* Conteúdo principal */
        .content {
            margin-left: 270px;
            padding: 20px;
            flex-grow: 1;
        }

        h1 {
            font-size: 2em;
        }

        p {
            font-size: 1.2em;
        }

        h2 {
            color: #2E8B57;
        }
    </style>
</head>
<body>
    <!-- Barra lateral esquerda -->
    <div class="sidebar">

        <h2>Menu</h2>

        <ul>
            <li><a href="{% url 'receitas_medicinais' %}" style="color: white; text-decoration: none;">Receitas Medicinais</a></li>
            <li><a href="{% url 'pesquisas_cientificas' %}" style="color: white; text-decoration: none;">Pesquisas Científicas</a></li>
            <li><a href="{% url 'quem_sou_eu' %}" style="color: white; text-decoration: none;">Quem Sou Eu</a></li>
            <li><a href="{% url 'quem_somos_nos' %}" style="color: white; text-decoration: none;">Quem Somos Nós</a></li>
        </ul>
    </div>

    <!-- Conteúdo principal -->
    <div class="content">
        <h1>Bem-vindo ao Nutri Amorim!</h1>
        
        <!-- Exibindo as imagens -->
        <div>
            <img src="{% static 'img/golpe imagem.jpg' %}" alt="Imagem Golpe" style="width: 100%; max-width: 600px; margin-bottom: 20px;">
            <img src="{% static 'img/imagem golpe 3.jpg' %}" alt="Imagem Golpe 3" style="width: 100%; max-width: 600px; margin-bottom: 20px;">
        </div>

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
